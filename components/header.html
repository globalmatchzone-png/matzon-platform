<header class="header" id="mainHeader">

    <button class="menu-btn" id="headerBackBtn" style="display:none;" aria-label="Voltar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </button>

    <div class="logo-matzon" id="logoMatzon" style="cursor:pointer; display:inline-flex; align-items:flex-start;">
        MATZON<span style="font-size:7px; font-weight:600; color:rgba(255,255,255,0.5); margin-top:2px; margin-left:1px;">®</span>
    </div>

    <div id="headerProfileTitle" style="display:none; flex:1; font-size:15px; font-weight:700; font-family:var(--font-body); text-align:center; color:#fff;">Profile</div>

    <div style="display:flex; align-items:center; gap:4px;">
        <button class="menu-btn" id="searchBtn" aria-label="Pesquisar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
        </button>
        <button class="menu-btn" id="menuBtn" aria-label="Abrir menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#8a96a6">
                <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
            </svg>
        </button>
    </div>

</header>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(11,14,20,0.97); z-index:200; flex-direction:column; padding:16px;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
        <div style="flex:1; display:flex; align-items:center; background:var(--bg-card); border-radius:12px; padding:0 14px; border:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input id="searchInput" type="text" placeholder="Search players, tournaments..." style="flex:1; background:none; border:none; outline:none; color:#fff; font-size:15px; font-family:var(--font-body); padding:14px 10px;">
        </div>
        <button id="searchCloseBtn" class="menu-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div style="display:flex; gap:8px; margin-bottom:16px;">
        <button class="search-filter active" data-filter="all">All</button>
        <button class="search-filter" data-filter="players">Players</button>
        <button class="search-filter" data-filter="tournaments">Tournaments</button>
    </div>
    <div id="searchResults" style="overflow-y:auto; flex:1;"></div>
</div>
