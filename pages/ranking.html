        </div>

            <img src="https://flagcdn.com/w80/au.png" alt="Australia">
            <img src="https://flagcdn.com/w80/br.png" alt="Brazil">
            <img src="https://flagcdn.com/w80/sa.png" alt="Saudi Arabia">
            <img src="https://flagcdn.com/w80/it.png" alt="Italy">
            <img src="https://flagcdn.com/w80/us.png" alt="USA">
            <img src="https://flagcdn.com/w80/nl.png" alt="Netherlands">
            <img src="https://flagcdn.com/w80/ma.png" alt="Morocco">
            <img src="https://flagcdn.com/w80/ar.png" alt="Argentina">

            <img src="https://flagcdn.com/w80/za.png" alt="South Africa">
            <img src="https://flagcdn.com/w80/fr.png" alt="France">
            <img src="https://flagcdn.com/w80/jp.png" alt="Japan">
            <img src="https://flagcdn.com/w80/pl.png" alt="Poland">

    <div class="rnk-content">

        <h2 class="section-title">MATZON World Rankings</h2>

        <div class="tabs-container" style="margin-top:0;">
            <div class="tabs-scroll" id="rankingTabsScroll">
                <button class="tab-item">Rocket League</button>
                <button class="tab-item active">eFootball Console</button>
                <button class="tab-item">eFootball Mobile</button>

            <button class="rnk-btn-active">Nations</button>
            <button class="rnk-btn-inactive">Players</button>

        <div class="rnk-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="rankingSearchInput" placeholder="Look up Nation">
        </div>

        <div class="rnk-divider">
            <span>LAST UPDATED ON 20.04.2026</span>
        </div>

        <div class="rnk-table-header">
            <div class="rnk-col-rank">Rank</div>
            <div class="rnk-col-nation">Nation</div>
            <div class="rnk-col-fpi">FPI</div>
        </div>

        <div class="rnk-list" id="rankingList"></div>

        <div class="rnk-pagination">
            <button class="rnk-page-btn">&#171;</button>
            <button class="rnk-page-btn">&#8249;</button>
            <button class="rnk-page-btn active">1</button>
            <button class="rnk-page-btn">2</button>
            <button class="rnk-page-btn">&#8250;</button>
            <button class="rnk-page-btn">&#187;</button>
