<div id="rankingView" style="display:none;">

    <div class="rnk-banner">
        <div class="rnk-banner-text">
            <div class="rnk-banner-small">MATZON</div>
            <h1 class="rnk-banner-title">WORLD<br>RANKING</h1>
        </div>
        <div class="rnk-banner-flags">
            <img src="https://flagcdn.com/w80/br.png" alt="Brazil">
            <img src="https://flagcdn.com/w80/kr.png" alt="South Korea">
            <img src="https://flagcdn.com/w80/de.png" alt="Germany">
            <img src="https://flagcdn.com/w80/jp.png" alt="Japan">
            <img src="https://flagcdn.com/w80/fr.png" alt="France">
            <img src="https://flagcdn.com/w80/ar.png" alt="Argentina">
            <img src="https://flagcdn.com/w80/pl.png" alt="Poland">
            <img src="https://flagcdn.com/w80/ma.png" alt="Morocco">
            <img src="https://flagcdn.com/w80/tr.png" alt="Türkiye">
            <img src="https://flagcdn.com/w80/ng.png" alt="Nigeria">
            <img src="https://flagcdn.com/w80/it.png" alt="Italy">
            <img src="https://flagcdn.com/w80/pt.png" alt="Portugal">
        </div>
    </div>

    <div class="rnk-content">

        <h2 class="section-title">MATZON World Rankings</h2>

        <!-- Tabs Players / Countries -->
        <div class="tabs-container" style="margin-top:0;">
            <div class="tabs-scroll">
                <button class="tab-item active" id="rnkTabPlayers">Players</button>
                <button class="tab-item" id="rnkTabCountries">Countries</button>
            </div>
        </div>

        <!-- Search -->
        <div class="rnk-search" style="margin-top:16px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a96a6" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="rankingSearchInput" placeholder="Search player or nation">
        </div>

        <div class="rnk-divider">
            <span>LAST UPDATED ON 24.04.2026</span>
        </div>

        <!-- Panel Players -->
        <div id="rnkPanelPlayers">
            <div class="rnk-table-header">
                <div class="rnk-col-rank">Rank</div>
                <div class="rnk-col-nation">Player</div>
                <div class="rnk-col-fpi">PTS</div>
            </div>
            <div class="rnk-list" id="rnkPlayerList"></div>
        </div>

        <!-- Panel Countries -->
        <div id="rnkPanelCountries" style="display:none;">
            <div class="rnk-table-header">
                <div class="rnk-col-rank">Rank</div>
                <div style="width:44px;"></div>
                <div class="rnk-col-nation">Nation</div>
                <div class="rnk-col-fpi">FPI</div>
            </div>
            <div class="rnk-list" id="rnkCountryList"></div>
        </div>

        <div class="rnk-pagination">
            <button class="rnk-page-btn">&#171;</button>
            <button class="rnk-page-btn">&#8249;</button>
            <button class="rnk-page-btn active">1</button>
            <button class="rnk-page-btn">2</button>
            <button class="rnk-page-btn">&#8250;</button>
            <button class="rnk-page-btn">&#187;</button>
        </div>

    </div>
</div>
