<div id="profileView" style="display: none;">

    <div class="prf-user-card">
        <div id="prf-hero-bg" class="prf-merged-hero-bg">
            <button class="prf-settings-btn" aria-label="Configurações">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
                </svg>
            </button>
        </div>
        <div class="prf-user-info-container">
            <div class="prf-avatar-wrapper">
                <div id="prf-initials" class="prf-avatar-merged"></div>
                <img id="prf-flag-img" src="" alt="" class="prf-player-nation-flag">
            </div>
            <h1 id="prf-gamertag" class="prf-nation-name" style="font-size:22px; margin-top:12px;"></h1>
            <div class="prf-player-tags">
                <span id="prf-role-pill" class="pill active prf-pill-small"></span>
                <span id="prf-nation-txt" class="prf-country-text"></span>
            </div>
            <div class="prf-world-rank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent-orange)"><path d="M12 2L3 6V12C3 17.55 6.84 22.74 12 24C17.16 22.74 21 17.55 21 12V6L12 2Z"/></svg>
                World Rank <strong id="prf-world-rank-num" class="prf-rank-highlight"></strong>
            </div>
        </div>
    </div>

    <div class="schedule-card prf-stats-strip">
        <div class="prf-stats-row">
            <div class="prf-stat"><div id="prf-stat-matches" class="prf-stat-val">—</div><div class="prf-stat-key">MATCHES</div></div>
            <div class="prf-stat-sep"></div>
            <div class="prf-stat"><div id="prf-stat-goals" class="prf-stat-val" style="color:var(--accent-orange);">—</div><div class="prf-stat-key">GOALS</div></div>
            <div class="prf-stat-sep"></div>
            <div class="prf-stat"><div id="prf-stat-assists" class="prf-stat-val">—</div><div class="prf-stat-key">ASSISTS</div></div>
            <div class="prf-stat-sep"></div>
            <div class="prf-stat"><div id="prf-stat-avg" class="prf-stat-val prf-text-green">—</div><div class="prf-stat-key">AVG</div></div>
        </div>
    </div>

    <div class="tabs-container prf-tabs-margin">
        <div class="tabs-scroll" id="profileTabsScroll">
            <button class="tab-item active js-prf-tab" data-target="tab-stats">Stats</button>
            <button class="tab-item js-prf-tab" data-target="tab-history">History</button>
            <button class="tab-item js-prf-tab" data-target="tab-achievements">Achievements</button>
        </div>
    </div>

    <div class="prf-panel active" id="tab-stats">
        <div class="matchups-section pt-0">
            <h2 class="section-title prf-small-title">Recent Form</h2>
            <div id="prf-form-row" class="prf-form-row"></div>
        </div>
        <div class="standings-section pt-0">
            <h2 class="section-title prf-small-title">Performance</h2>
            <div class="standing-row prf-performance-card" id="prf-perf-card"></div>
        </div>
        <div class="standings-section pt-0 pb-24">
            <h2 class="section-title prf-small-title">Current Tournament</h2>
            <div class="standing-row prf-current-tourney">
                <div class="prf-tourney-header">
                    <div class="prf-tourney-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--accent-orange)"><path d="M12 2L3 6V12C3 17.55 6.84 22.74 12 24C17.16 22.74 21 17.55 21 12V6L12 2Z"/></svg>
                    </div>
                    <div class="prf-tourney-info">
                        <div id="prf-tourney-name" class="prf-tourney-name"></div>
                        <div id="prf-tourney-desc" class="prf-tourney-desc"></div>
                    </div>
                    <div id="prf-tourney-pos" class="prf-tourney-pos"></div>
                </div>
                <div class="prf-tourney-stats">
                    <div class="prf-mini-stat"><div id="prf-ct-mp" class="prf-mini-val">—</div><div class="prf-mini-key">MP</div></div>
                    <div class="prf-mini-stat"><div id="prf-ct-goals" class="prf-mini-val" style="color:var(--accent-orange);">—</div><div class="prf-mini-key">GOALS</div></div>
                    <div class="prf-mini-stat"><div id="prf-ct-assists" class="prf-mini-val">—</div><div class="prf-mini-key">ASSISTS</div></div>
                    <div class="prf-mini-stat"><div id="prf-ct-avg" class="prf-mini-val prf-text-green">—</div><div class="prf-mini-key">AVG</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="prf-panel" id="tab-history">
        <div class="matchups-section pt-0">
            <h2 class="section-title prf-small-title">Match History</h2>
            <div id="prf-history-list" class="match-cards"></div>
        </div>
    </div>

    <div class="prf-panel" id="tab-achievements">
        <div class="standings-section pt-0">
            <h2 class="section-title prf-small-title">Badges Earned</h2>
            <div id="prf-badges-grid" class="prf-badges-grid"></div>
        </div>
    </div>

    <!-- CTA — core loop -->
    <div style="padding: 8px 16px 32px;">
        <button id="btnJoinTournament" style="
            width:100%; padding:16px; border-radius:12px;
            background:linear-gradient(135deg,#ff7a00,#ff5e00);
            color:#000; font-size:15px; font-weight:800;
            border:none; cursor:pointer; font-family:var(--font-body);
            letter-spacing:0.3px; transition: opacity 0.2s;">
            ⚔️ JOIN TOURNAMENT
        </button>
    </div>

</div>
